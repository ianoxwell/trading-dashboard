<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>StakeDashboard</title>
    <base href="/" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />

    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/x-icon" href="assets/favicon-light.ico" sizes="any" />
    <link rel="icon" type="image/png" href="assets/favicon-light-32x32.png" sizes="32x32" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="assets/favicon-light-16x16.png" sizes="16x16" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="assets/favicon-dark-32x32.png" sizes="32x32" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" href="assets/favicon-dark-16x16.png" sizes="16x16" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/x-icon" href="assets/favicon-dark.ico" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0b0b" />
    <link rel="manifest" href="/site.webmanifest" />

    <link rel="preload" href="assets/stake_logo.svg" as="image" fetchpriority="high" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
      as="style"
      media="print"
      onload="this.media='all'; this.onload=null;"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
      as="style"
      media="print"
      onload="this.media='all'; this.onload=null;"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
